# Redis configuration for Клёво
# Used for: rate limiting (sliding window), session cache

# Network
bind 0.0.0.0
port 6379
protected-mode yes

# Authentication (set via environment or override)
# requirepass your-redis-password

# Persistence (AOF for rate limit accuracy)
appendonly yes
appendfsync everysec
no-appendfsync-on-rewrite no

# Memory management
maxmemory 256mb
maxmemory-policy allkeys-lru

# Keyspace notifications (for TTL expiry events — rate limiter)
notify-keyspace-events Ex

# Logging
loglevel notice
logfile ""

# Connection limits
maxclients 100
timeout 300

# Performance
tcp-keepalive 300
tcp-backlog 511
