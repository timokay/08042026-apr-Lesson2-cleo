name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:   # allow manual trigger from GitHub UI

jobs:
  deploy:
    name: Deploy to HOSTKEY Moscow VPS
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Pre-flight: secrets sanity check ───────────────────────────────────
      - name: Verify required secrets are set
        run: |
          missing=()
          [[ -z "${{ secrets.VPS_HOST }}" ]]                && missing+=("VPS_HOST")
          [[ -z "${{ secrets.VPS_USER }}" ]]                && missing+=("VPS_USER")
          [[ -z "${{ secrets.VPS_SSH_KEY }}" ]]             && missing+=("VPS_SSH_KEY")
          [[ -z "${{ secrets.CLAUDE_API_KEY }}" ]]          && missing+=("CLAUDE_API_KEY")
          [[ -z "${{ secrets.SUPABASE_URL }}" ]]            && missing+=("SUPABASE_URL")
          [[ -z "${{ secrets.SUPABASE_ANON_KEY }}" ]]       && missing+=("SUPABASE_ANON_KEY")
          [[ -z "${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" ]] && missing+=("SUPABASE_SERVICE_ROLE_KEY")
          [[ -z "${{ secrets.POSTGRES_PASSWORD }}" ]]       && missing+=("POSTGRES_PASSWORD")
          [[ -z "${{ secrets.JWT_SECRET }}" ]]              && missing+=("JWT_SECRET")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "❌ Missing secrets: ${missing[*]}"
            exit 1
          fi
          echo "✅ All required secrets present"

      # ── SSH deploy ─────────────────────────────────────────────────────────
      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS to known hosts
        run: |
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy via SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          YANDEX_GPT_API_KEY: ${{ secrets.YANDEX_GPT_API_KEY }}
          YANDEX_GPT_FOLDER_ID: ${{ secrets.YANDEX_GPT_FOLDER_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          ROBOKASSA_MERCHANT_LOGIN: ${{ secrets.ROBOKASSA_MERCHANT_LOGIN }}
          ROBOKASSA_PASSWORD1: ${{ secrets.ROBOKASSA_PASSWORD1 }}
          ROBOKASSA_PASSWORD2: ${{ secrets.ROBOKASSA_PASSWORD2 }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_ALERT_CHAT_ID: ${{ secrets.TELEGRAM_ALERT_CHAT_ID }}
          PLUS_PRICE_RUB: ${{ secrets.PLUS_PRICE_RUB || '299.00' }}
          PLUS_DURATION_DAYS: "30"
        run: |
          ssh $VPS_USER@$VPS_HOST << 'ENDSSH'
            set -e
            cd /opt/klevo

            echo "→ Pulling latest code..."
            git fetch origin main
            git reset --hard origin/main

            echo "→ Writing .env..."
            cat > .env << EOF
          CLAUDE_API_KEY=${CLAUDE_API_KEY}
          PROXY_API_URL=https://api.proxyapi.ru/anthropic
          YANDEX_GPT_API_KEY=${YANDEX_GPT_API_KEY}
          YANDEX_GPT_FOLDER_ID=${YANDEX_GPT_FOLDER_ID}
          SUPABASE_URL=${SUPABASE_URL}
          SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
          SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
          POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
          JWT_SECRET=${JWT_SECRET}
          ROBOKASSA_MERCHANT_LOGIN=${ROBOKASSA_MERCHANT_LOGIN}
          ROBOKASSA_PASSWORD1=${ROBOKASSA_PASSWORD1}
          ROBOKASSA_PASSWORD2=${ROBOKASSA_PASSWORD2}
          ROBOKASSA_TEST_MODE=false
          TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
          TELEGRAM_ALERT_CHAT_ID=${TELEGRAM_ALERT_CHAT_ID}
          PLUS_PRICE_RUB=${PLUS_PRICE_RUB}
          PLUS_DURATION_DAYS=${PLUS_DURATION_DAYS}
          NEXT_PUBLIC_APP_URL=https://klevo.app
          EOF

            echo "→ Building and starting services..."
            docker compose pull redis nginx 2>/dev/null || true
            docker compose build --no-cache web ai-service
            docker compose up -d --remove-orphans

            echo "→ Waiting for services to be healthy (max 60s)..."
            timeout 60 bash -c 'until docker compose ps | grep -E "web.*healthy" && docker compose ps | grep -E "ai-service.*healthy"; do sleep 3; done'

            echo "✅ Deploy complete"
          ENDSSH

      # ── Post-deploy health checks ──────────────────────────────────────────
      - name: Health check — web
        run: |
          sleep 5
          response=$(curl -sf -o /dev/null -w "%{http_code}" https://klevo.app/api/health || echo "000")
          if [ "$response" != "200" ]; then
            echo "❌ Web health check failed: HTTP $response"
            exit 1
          fi
          echo "✅ Web: HTTP $response"

      - name: Health check — AI service
        run: |
          response=$(curl -sf https://klevo.app/api/ai/health 2>/dev/null || echo '{"status":"error"}')
          status=$(echo "$response" | python3 -c "import sys,json; print(json.load(sys.stdin).get('status','error'))")
          if [ "$status" != "ok" ]; then
            echo "❌ AI service health check failed: $response"
            exit 1
          fi
          echo "✅ AI service: $response"

      # ── Rollback on failure ────────────────────────────────────────────────
      - name: Rollback on failure
        if: failure()
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          echo "🔄 Attempting rollback to previous commit..."
          ssh $VPS_USER@$VPS_HOST << 'ENDSSH'
            set -e
            cd /opt/klevo
            previous=$(git log --format="%H" -n 2 | tail -1)
            echo "Rolling back to $previous"
            git checkout "$previous"
            docker compose build web ai-service
            docker compose up -d
            echo "⚠️ Rolled back to $previous"
          ENDSSH
